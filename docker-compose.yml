version: '3.8'

services:
  database:
    image: postgres:16-alpine
    container_name: lab-booking-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-lab_booking}
      POSTGRES_USER: ${DB_USER:-labuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-labpassword}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lab-booking-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-labuser} -d ${DB_NAME:-lab_booking}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lab-booking-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DEMO: true
      DATABASE_URL: postgresql://${DB_USER:-labuser}:${DB_PASSWORD:-labpassword}@database:5432/${DB_NAME:-lab_booking}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars-long-secret}
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-80},http://localhost
      LOG_LEVEL: info
      AGENT_ENABLED: "true"
      AGENT_LLM_ENDPOINT: "https://kkopenailearn.openai.azure.com/openai/responses?api-version=2025-04-01-preview"
      AGENT_LLM_API_KEY: "${AGENT_LLM_API_KEY:-aa10ceffe7d0421b9f62fa160dec824d}"
      AGENT_LLM_MODEL: "gpt-4o"
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - lab-booking-network
    command: >
      sh -c "npx prisma generate && npx prisma migrate deploy && node dist/server.js"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lab-booking-frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:3001
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - lab-booking-network

volumes:
  postgres_data:
    driver: local

networks:
  lab-booking-network:
    driver: bridge
